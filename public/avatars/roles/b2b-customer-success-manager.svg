      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#0D1E38"/>
    </linearGradient>
    <linearGradient id="shine-b2b-customer-success-manager" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.08"/>
    </linearGradient>
    <clipPath id="circle-b2b-customer-success-manager">
