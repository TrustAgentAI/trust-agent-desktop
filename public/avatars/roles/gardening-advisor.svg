<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg-gardening-advisor" x1="0%" y1="0%" x2="100%" y2="100%" gradientTransform="rotate(138 128 128)">
      <stop offset="0%" stop-color="#CC3399"/>
      <stop offset="100%" stop-color="#B02880"/>
    </linearGradient>
    <linearGradient id="shine-gardening-advisor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.08"/>
    </linearGradient>
    <clipPath id="circle-gardening-advisor">
      <circle cx="128" cy="128" r="128"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="url(#bg-gardening-advisor)"/>

  <!-- Subtle pattern ring -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <circle cx="128" cy="128" r="110" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="0.5"/>

  <!-- Icon silhouette -->
  <g clip-path="url(#circle-gardening-advisor)" color="white">
    
    <circle cx="128" cy="115" r="15" fill="currentColor" opacity="0.9"/>
    <circle cx="150.0" cy="115.0" r="13" fill="currentColor" opacity="0.65"/>
    <circle cx="139.0" cy="134.1" r="13" fill="currentColor" opacity="0.65"/>
    <circle cx="117.0" cy="134.1" r="13" fill="currentColor" opacity="0.65"/>
    <circle cx="106.0" cy="115.0" r="13" fill="currentColor" opacity="0.65"/>
    <circle cx="117.0" cy="95.9" r="13" fill="currentColor" opacity="0.65"/>
    <circle cx="139.0" cy="95.9" r="13" fill="currentColor" opacity="0.65"/>
    <line x1="128" y1="130" x2="128" y2="180" stroke="currentColor" opacity="0.7" stroke-width="4"/>
    <path d="M128 155 Q140 145 148 150" fill="none" stroke="currentColor" opacity="0.5" stroke-width="3"/>
  
  </g>

  <!-- Gradient shine overlay -->
  <circle cx="128" cy="128" r="128" fill="url(#shine-gardening-advisor)"/>

  <!-- Subtle border -->
  <circle cx="128" cy="128" r="126" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="1.5"/>
</svg>