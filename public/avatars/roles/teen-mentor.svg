<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg-teen-mentor" x1="0%" y1="0%" x2="100%" y2="100%" gradientTransform="rotate(184 128 128)">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#E07530"/>
    </linearGradient>
    <linearGradient id="shine-teen-mentor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.08"/>
    </linearGradient>
    <clipPath id="circle-teen-mentor">
      <circle cx="128" cy="128" r="128"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="url(#bg-teen-mentor)"/>

  <!-- Subtle pattern ring -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <circle cx="128" cy="128" r="110" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="0.5"/>

  <!-- Icon silhouette -->
  <g clip-path="url(#circle-teen-mentor)" color="white">
    
    <circle cx="128" cy="95" r="32" fill="currentColor" opacity="0.95"/>
    <ellipse cx="128" cy="185" rx="55" ry="38" fill="currentColor" opacity="0.9"/>
  
  </g>

  <!-- Gradient shine overlay -->
  <circle cx="128" cy="128" r="128" fill="url(#shine-teen-mentor)"/>

  <!-- Subtle border -->
  <circle cx="128" cy="128" r="126" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="1.5"/>
</svg>