<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg-bedtime-story-companion" x1="0%" y1="0%" x2="100%" y2="100%" gradientTransform="rotate(151 128 128)">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#E07530"/>
    </linearGradient>
    <linearGradient id="shine-bedtime-story-companion" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.08"/>
    </linearGradient>
    <clipPath id="circle-bedtime-story-companion">
      <circle cx="128" cy="128" r="128"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="url(#bg-bedtime-story-companion)"/>

  <!-- Subtle pattern ring -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <circle cx="128" cy="128" r="110" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="0.5"/>

  <!-- Icon silhouette -->
  <g clip-path="url(#circle-bedtime-story-companion)" color="white">
    
    <path d="M128 70 L140 110 L180 112 L148 138 L158 178 L128 155 L98 178 L108 138 L76 112 L116 110 Z" fill="currentColor" opacity="0.9"/>
  
  </g>

  <!-- Gradient shine overlay -->
  <circle cx="128" cy="128" r="128" fill="url(#shine-bedtime-story-companion)"/>

  <!-- Subtle border -->
  <circle cx="128" cy="128" r="126" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="1.5"/>
</svg>