      <stop offset="0%" stop-color="#1E6FFF"/>
      <stop offset="100%" stop-color="#1452B8"/>
    </linearGradient>
    <linearGradient id="shine-gcse-maths-tutor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.08"/>
    </linearGradient>
    <clipPath id="circle-gcse-maths-tutor">
      <circle cx="128" cy="128" r="128"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="url(#bg-gcse-maths-tutor)"/>

  <!-- Subtle pattern ring -->
